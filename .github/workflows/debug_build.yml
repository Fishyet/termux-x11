name: Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "img/**"
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "img/**"

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Validation
        uses: gradle/actions/wrapper-validation@v4

      - name: Java setup
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build
        run: ./gradlew assembleDebug

      - name: Copy native libraries to jniLibs for artifact
        run: |
          mkdir -p ./app/src/main/jniLibs/arm64-v8a
          mkdir -p ./app/src/main/jniLibs/armeabi-v7a  
          mkdir -p ./app/src/main/jniLibs/x86_64
          mkdir -p ./app/src/main/jniLibs/x86
          find ./app/build/intermediates/cxx/Debug -name "libXlorie.so" -path "*/arm64-v8a/*" -exec cp {} ./app/src/main/jniLibs/arm64-v8a/ \;
          find ./app/build/intermediates/cxx/Debug -name "libXlorie.so" -path "*/armeabi-v7a/*" -exec cp {} ./app/src/main/jniLibs/armeabi-v7a/ \;
          find ./app/build/intermediates/cxx/Debug -name "libXlorie.so" -path "*/x86_64/*" -exec cp {} ./app/src/main/jniLibs/x86_64/ \;
          find ./app/build/intermediates/cxx/Debug -name "libXlorie.so" -path "*/x86/*" -exec cp {} ./app/src/main/jniLibs/x86/ \;

      - name: Build companion package
        run: ./build_termux_package
      - name: Store app-arm64-v8a-debug
        uses: actions/upload-artifact@v4
        with:
          name: termux-x11-arm64-v8a-debug
          path: ./app/build/outputs/apk/debug/app-arm64-v8a-debug.apk

      - name: Store app-armeabi-v7a-debug
        uses: actions/upload-artifact@v4
        with:
          name: termux-x11-armeabi-v7a-debug
          path: ./app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk

      - name: Store app-universal-debug
        uses: actions/upload-artifact@v4
        with:
          name: termux-x11-universal-debug
          path: ./app/build/outputs/apk/debug/app-universal-debug.apk

      - name: Store app-x86_64-debug
        uses: actions/upload-artifact@v4
        with:
          name: termux-x11-x86_64-debug
          path: ./app/build/outputs/apk/debug/app-x86_64-debug.apk

      - name: Store app-x86-debug
        uses: actions/upload-artifact@v4
        with:
          name: termux-x11-x86-debug
          path: ./app/build/outputs/apk/debug/app-x86-debug.apk

      - name: Store companion package
        uses: actions/upload-artifact@v4
        with:
          name: termux-companion packages
          path: |
            ./app/build/outputs/apk/debug/termux-x11-*-all.deb
            ./app/build/outputs/apk/debug/termux-x11-*-any.pkg.tar.xz

      - name: Store unstripped libraries with debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: termux-x11-unstripped-libraries-for-ndk-stack
          path: ./app/build/intermediates/cxx/Debug/*

      - name: Store compiled native libraries for local development
        uses: actions/upload-artifact@v4
        with:
          name: termux-x11-native-libraries
          path: |
            ./app/build/intermediates/cxx/Debug/*/arm64-v8a/libXlorie.so
            ./app/build/intermediates/cxx/Debug/*/armeabi-v7a/libXlorie.so  
            ./app/build/intermediates/cxx/Debug/*/x86_64/libXlorie.so
            ./app/build/intermediates/cxx/Debug/*/x86/libXlorie.so
            ./app/src/main/jniLibs/

      - name: Update Nightly Release
        uses: andelf/nightly-release@main
        if: github.repository == 'termux/termux-x11' && github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: "Nightly Release $$"
          draft: false
          prerelease: false
          body: |
            This is a nightly release of the termux-x11 app.
            Based on ${{ github.sha }}
          files: |
            ./app/build/outputs/apk/debug/app-*-debug.apk
            ./app/build/outputs/apk/debug/termux-x11-*-all.deb
            ./app/build/outputs/apk/debug/termux-x11-*-any.pkg.tar.xz
